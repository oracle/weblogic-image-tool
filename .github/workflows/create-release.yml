name: Create Release
run-name: Creating draft release for ${{ github.ref_name }}

on:
  push:
    tags:
      - 'release-*'

permissions:
  contents: write

jobs:
  release_job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      - name: Build Image Tool installer
        run: |
          mvn -version
          mvn -B clean package
      - id: version
        run: echo "number=`echo "${{ github.ref_name }}" | sed 's/release-//'`" >> $GITHUB_OUTPUT
      - name: Create draft release and attach installer zip
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
          --draft \
          --generate-notes \
          --title 'WebLogic Image Tool ${{ steps.version.outputs.number }}' \
          installer/target/imagetool.zip
