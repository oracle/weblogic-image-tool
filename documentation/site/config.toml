# analytics
googleAnalytics = "UA-129126578-2"

baseURL = "/weblogic-image-tool/"
locale = "en-us"
title = "WebLogic Image Tool"

# Change the default theme to be use when building the site with Hugo
theme = "hugo-theme-relearn-9.0.3"

publishDir = "docs"

# For search functionality
[outputs]
  home = [ "HTML", "RSS", "JSON"]

[markup]
  defaultMarkdownHandler = 'goldmark'
  [markup.goldmark]
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
    [markup.goldmark.renderer]
      unsafe = true

[params]
  hideAuthorDate = true
  # disable the copy to clipboard links
  disableInlineCopyToClipBoard = true
  externalLinkTarget = "_blank"
  linkTitle = "WebLogic\nImage Tool"
  logo = { src = "/images/logo.png", direction = "column" }
  themeVariant = "learn"
